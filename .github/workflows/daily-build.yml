name: 🛠️ Weekly Ubuntu App Image Builder

on:
  schedule:
    - cron: '0 0 * * 0' # Runs every Sunday at 00:00 UTC
  workflow_dispatch: # Allows manual triggers

permissions:
  contents: read
  packages: write # Crucial for pushing and deleting images

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Define Image Variables
        id: image_vars
        run: |
          echo "IMAGE_TAG=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT
          echo "IMAGE_NAME=ubuntu-jumpbox" >> $GITHUB_OUTPUT

      - name: Log in to GHCR.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push the image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ steps.image_vars.outputs.IMAGE_NAME }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ steps.image_vars.outputs.IMAGE_NAME }}:${{ steps.image_vars.outputs.IMAGE_TAG }}

  cleanup-old-images:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Delete old image versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'ubuntu-jumpbox'
          package-type: 'container'
          # Keeps the 'latest' tag plus the 3 most recent date-stamped versions
          min-versions-to-keep: 4 
          # Ensure we don't accidentally delete the one we just built
          ignore-versions: 'latest'
